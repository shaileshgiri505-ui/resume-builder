<section class="page-header">

<h1>QR Code Generator</h1>

<p>
Generate QR Codes Instantly
</p>

</section>

<div class="container">

<div class="tool-card">

<input
type="text"
id="qrText"
placeholder="Enter Text or URL">

<button onclick="generateQR()">
Generate QR
</button>

<button onclick="clearQR()">
Clear
</button>

<div
id="qrcode"
style="margin-top:20px;">
</div>

</div>

</div>

<footer>

<h2>EasyEdit</h2>

<p>
QR Generator Module
</p>

</footer>

<script>

function generateQR(){

let qrText =
document.getElementById(
"qrText"
).value;

if(qrText === ""){

alert(
"Please enter text or URL"
);

return;

}

document.getElementById(
"qrcode"
).innerHTML = "";

new QRCode(
document.getElementById(
"qrcode"
),
{
text: qrText,
width: 250,
height: 250
}
);

}

function clearQR(){

document.getElementById(
"qrText"
).value = "";

document.getElementById(
"qrcode"
).innerHTML = "";

}

</script>

</body>
</html>
