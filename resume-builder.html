<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Builder - EasyEdit</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<nav class="navbar">

<div class="logo">
EasyEdit
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="resume-builder.html">Resume Builder</a></li>

<li><a href="pdf-tools.html">PDF Tools</a></li>

<li><a href="image-tools.html">Image Tools</a></li>

<li><a href="qr-tools.html">QR Tools</a></li>

</ul>

</nav>

<div class="container">

<div class="resume-form">

<h2>Create Resume</h2>

<input type="file" id="photo">

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="phone"
placeholder="Phone">

<textarea
id="summary"
placeholder="Professional Summary"></textarea>

<textarea
id="education"
placeholder="Education"></textarea>

<textarea
id="skills"
placeholder="Skills"></textarea>

<textarea
id="experience"
placeholder="Experience"></textarea>

<textarea
id="projects"
placeholder="Projects"></textarea>

<button onclick="generateResume()">
Generate Resume
</button>

<button onclick="downloadPDF()">
Download PDF
</button>

</div>

<div
id="resumePreview"
class="resume-preview">

<h2>
Resume Preview
</h2>

</div>

</div>

<script>

function generateResume(){

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

let phone =
document.getElementById("phone").value;

let summary =
document.getElementById("summary").value;

let education =
document.getElementById("education").value;

let skills =
document.getElementById("skills").value;

let experience =
document.getElementById("experience").value;

let projects =
document.getElementById("projects").value;

document.getElementById(
"resumePreview"
).innerHTML = `

<h1>${name}</h1>

<p>${email}</p>

<p>${phone}</p>

<h3>Professional Summary</h3>

<p>${summary}</p>

<h3>Education</h3>

<p>${education}</p>

<h3>Skills</h3>

<p>${skills}</p>

<h3>Experience</h3>

<p>${experience}</p>

<h3>Projects</h3>

<p>${projects}</p>

`;

}

function downloadPDF(){

const element =
document.getElementById(
"resumePreview"
);

html2pdf()
.from(element)
.save("resume.pdf");

}

</script>

</body>
</html>
