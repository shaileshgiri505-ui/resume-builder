<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Resume Builder</h1>

    <div class="form-box">

        <label>Profile Photo</label>
        <input type="file" id="photo" accept="image/*">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter Full Name">

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter Email">

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter Phone Number">

        <label>Professional Summary</label>
        <textarea id="objective" rows="4" placeholder="Write about yourself"></textarea>

        <label>Education</label>
        <textarea id="education" rows="4" placeholder="Enter Education Details"></textarea>

        <label>Skills</label>
        <textarea id="skills" rows="4" placeholder="Enter Skills"></textarea>

        <div class="btn-group">
            <button onclick="generateResume()">
                Generate Resume
            </button>

            <button type="button" class="clear-btn" onclick="resetForm()">
                Reset Form
            </button>
        </div>

    </div>

    <div id="resumePreview"></div>

</div>

<script src="script.js"></script>

</body>
</html>
