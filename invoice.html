<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice Generator - EasyEdit</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<nav class="navbar">

<div class="logo">
EasyEdit
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="resume-builder.html">Resume Builder</a></li>

<li><a href="pdf-tools.html">PDF Tools</a></li>

<li><a href="image-tools.html">Image Tools</a></li>

<li><a href="qr-tools.html">QR Tools</a></li>

<li><a href="invoice.html">Invoice</a></li>

</ul>

</nav>

<section class="page-header">

<h1>Invoice Generator</h1>

<p>Create Professional Invoices Instantly</p>

</section>

<div class="container">

<div class="resume-form">

<input
type="text"
id="business"
placeholder="Business Name">

<input
type="text"
id="client"
placeholder="Client Name">

<input
type="text"
id="invoiceNo"
placeholder="Invoice Number">

<input
type="number"
id="amount"
placeholder="Amount">

<input
type="number"
id="gst"
placeholder="GST %">

<button onclick="generateInvoice()">
Generate Invoice
</button>

<button onclick="downloadInvoice()">
Download PDF
</button>

</div>

<div
id="invoicePreview"
class="resume-preview">

<h2>Invoice Preview</h2>

</div>

</div>

<script>

function generateInvoice(){

let business =
document.getElementById(
"business"
).value;

let client =
document.getElementById(
"client"
).value;

let invoiceNo =
document.getElementById(
"invoiceNo"
).value;

let amount =
parseFloat(
document.getElementById(
"amount"
).value || 0
);

let gst =
parseFloat(
document.getElementById(
"gst"
).value || 0
);

let gstAmount =
(amount * gst) / 100;

let total =
amount + gstAmount;

document.getElementById(
"invoicePreview"
).innerHTML = `

<h1>${business}</h1>

<hr>

<p>
<strong>Client:</strong>
${client}
</p>

<p>
<strong>Invoice No:</strong>
${invoiceNo}
</p>

<p>
<strong>Amount:</strong>
₹${amount}
</p>

<p>
<strong>GST:</strong>
₹${gstAmount.toFixed(2)}
</p>

<h2>
Total:
₹${total.toFixed(2)}
</h2>

`;

}

function downloadInvoice(){

const element =
document.getElementById(
"invoicePreview"
);

html2pdf()
.from(element)
.save("invoice.pdf");

}

</script>

</body>
</html>
